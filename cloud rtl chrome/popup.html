<!-- popup.html -->
<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Tahoma, sans-serif;
      text-align: center;
    }
    h2 {
      margin: 0 0 10px 0;
    }
    .desc {
      color: #666;
      font-size: 12px;
      margin-bottom: 20px;
    }
    .toggle-container {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .switch {
      position: relative;
      width: 50px;
      height: 26px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 26px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #2196F3;
    }
    input:checked + .slider:before {
      transform: translateX(24px);
    }
    .footer {
      color: #999;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <h2>Claude RTL Plus</h2>
  <p class="desc">افزونه‌ای برای راست‌چین و فارسی‌سازی چت‌های Claude</p>
  
  <div class="toggle-container">
    <div class="toggle">
      <span>فعال‌سازی RTL</span>
      <label class="switch">
        <input type="checkbox" id="rtlToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>
  
  <p class="footer">طراحی شده توسط <a href="https://www.instagram.com/samimooka" target="_blank">SamiMooka</a> با ♥ برای تو</p>
  
  <script src="popup.js"></script>
</body>
</html>
